name: CI

on:
  push:
    branches: [main, staging, "feature/**"]
  pull_request:
    branches: [main, staging]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-test.txt

      - name: Lint (ruff)
        run: ruff check src/ tests/

      - name: SCA — dependency audit (pip audit)
        run: pip audit

      - name: Run tests
        env:
          JWT_SECRET_KEY: test-secret-key-for-ci-only-not-used-in-production
        run: pytest tests/ -v --cov=src --cov-report=term-missing --cov-fail-under=90
